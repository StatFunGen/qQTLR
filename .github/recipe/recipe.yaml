context:
  version: VERSION_PLACEHOLDER

package:
  name: r-qqtlr
  version: ${{ version }}

source:
  path: qqtlr-${{ version }}.tar.gz
  sha256: SHA256SUM_PLACEHOLDER

build:
  number: BUILD_PLACEHOLDER
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
  script: R CMD INSTALL --build .

requirements:
  host:
    - r-base
    - r-bigsnpr
    - r-bigstatsr
    - r-dplyr
    - r-pecotmr
    - r-readr
    - r-tidyr
    - r-vroom
    - r-quadprog
    - r-quantreg
    - bioconductor-qvalue
    - r-rfast
    - r-xicor
  run:
    - r-base
    - r-bigsnpr
    - r-bigstatsr
    - r-dplyr
    - r-pecotmr
    - r-readr
    - r-tidyr
    - r-vroom
    - r-quadprog
    - r-quantreg
    - bioconductor-qvalue
    - r-rfast
    - r-xicor

tests:
  - script:
      - R -e "library('qQTLR')"

about:
  license: MIT
  license_file: LICENSE
  summary: pecotmr implements pair-wise enrichment, colocalization, TWAS and Mendelian Randomization to integrate QTL and GWAS analysis based on a fine-mapped single effects model.
  homepage: https://github.com/StatFunGen/qQTLR
